<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공지사항 | CCTLab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <a class="logo" href="index.html">CCTLab</a>
        <ul>
          <li><a href="index.html">메인</a></li>
          <li><a href="about.html">연구실 소개</a></li>
          <li><a href="research.html">연구 분야</a></li>
          <li><a href="members.html">구성원</a></li>
          <li><a href="publications.html">출판물</a></li>
          <li><a class="active" href="notice.html">공지사항</a></li>
          <li><a href="contact.html">연락처</a></li>
        </ul>
      </nav>
    </header>

    <main class="section container">
      <h2 class="section-title">공지사항</h2>
      <p class="lead">
        공지사항은 게시판 형식으로 제공되며, 글 작성은 관리자 로그인 후에만
        가능합니다.
      </p>

      <section class="board-layout">
        <div class="card board-list-card">
          <div class="board-head">
            <h3>공지 목록</h3>
            <span id="notice-count" class="board-count"></span>
          </div>
          <div id="notice-empty" class="notice-msg">
            등록된 공지사항이 없습니다.
          </div>
          <div class="board-table-wrap">
            <table class="board-table">
              <thead>
                <tr>
                  <th scope="col">번호</th>
                  <th scope="col">제목</th>
                  <th scope="col">작성일</th>
                </tr>
              </thead>
              <tbody id="notice-table-body"></tbody>
            </table>
          </div>
        </div>

        <aside class="board-side">
          <section class="card notice-view-card">
            <div class="board-head">
              <h3>공지 상세</h3>
            </div>
            <div id="notice-detail" class="notice-detail empty">
              왼쪽 목록에서 공지를 선택하세요.
            </div>
          </section>

          <section class="card admin-card">
            <div class="board-head">
              <h3>관리자</h3>
              <button type="button" id="logout-btn" class="button-secondary hidden">
                로그아웃
              </button>
            </div>

            <form id="admin-login-form" class="admin-login-form">
              <div class="form-row">
                <label for="admin-id">아이디</label>
                <input id="admin-id" type="text" autocomplete="username" required />
              </div>
              <div class="form-row">
                <label for="admin-password">비밀번호</label>
                <input
                  id="admin-password"
                  type="password"
                  autocomplete="current-password"
                  required
                />
              </div>
              <button type="submit">관리자 로그인</button>
            </form>

            <div id="admin-login-message" class="notice-msg hidden"></div>

            <form id="notice-form" class="admin-write-form hidden">
              <div class="form-row">
                <label for="title">제목</label>
                <input id="title" type="text" placeholder="공지 제목" required />
              </div>
              <div class="form-row">
                <label for="content">내용</label>
                <textarea
                  id="content"
                  placeholder="공지 내용을 입력하세요."
                  required
                ></textarea>
              </div>
              <button type="submit">공지 등록</button>
            </form>
          </section>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">© 2026 CCTLab, Sejong University</div>
    </footer>

    <script src="notice.js"></script>
  </body>
</html>
