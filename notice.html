<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공지사항 | CCTLab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <a class="logo" href="index.html">CCTLab</a>
        <ul>
          <li><a href="index.html">메인</a></li>
          <li><a href="about.html">연구실 소개</a></li>
          <li><a href="research.html">연구 분야</a></li>
          <li><a href="members.html">구성원</a></li>

          <li><a href="contact.html">연락처</a></li>
        </ul>
      </nav>
    </header>

    <main class="section container">
      <h2>공지사항</h2>
      <p class="lead">연구실 공지사항 초안을 작성하고 사진 파일을 업로드해 미리보기 할 수 있습니다.</p>

      <form class="card" id="notice-form">
        <div class="form-group">
          <label for="title">제목</label>
          <input id="title" type="text" placeholder="공지사항 제목을 입력하세요" />
        </div>

        <div class="form-group">
          <label for="content">내용</label>
          <textarea id="content" placeholder="공지사항 내용을 입력하세요"></textarea>
        </div>

        <div class="form-group">
          <label for="photo">사진 업로드</label>
          <input id="photo" type="file" accept="image/*" />
        </div>

        <button type="button" id="save-btn">공지 임시 저장</button>
        <div class="notice" id="save-message">아직 저장된 공지가 없습니다.</div>

        <div class="preview">
          <strong>업로드 이미지 미리보기</strong>
          <img id="preview-image" alt="업로드 미리보기 이미지" />
        </div>
      </form>
    </main>

    <footer class="footer"><div class="container">© 2026 CCTLab, Sejong University</div></footer>
    <script src="notice.js"></script>
  </body>
</html>
